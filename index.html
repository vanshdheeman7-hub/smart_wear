<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpineGuard V4 | Elite Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --bg-deep: #05020a;
            --lightning-purple: #8b00ff;
            --neon-blue: #00f2ff;
            --alert-red: #ff0055;
            --panel-glass: rgba(139, 0, 255, 0.05);
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0; padding: 40px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--lightning-purple);
            padding-bottom: 20px; margin-bottom: 40px;
        }

        h1 { font-family: 'Syncopate'; font-size: 2rem; letter-spacing: 5px; color: var(--neon-blue); margin: 0; }

        .dashboard-grid {
            display: grid; grid-template-columns: 480px 1fr; gap: 30px;
            max-width: 1600px; margin: 0 auto;
        }

        .card {
            background: var(--panel-glass);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(139, 0, 255, 0.3);
            border-radius: 35px; padding: 45px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
        }

        .full-width { grid-column: 1 / -1; }

        h2 { font-family: 'Syncopate'; font-size: 0.8rem; color: var(--lightning-purple); letter-spacing: 3px; margin-bottom: 30px; }

        #personWearing {
            background: rgba(0,0,0,0.5); border: 2px solid var(--neon-blue);
            padding: 20px; font-size: 1.8rem; color: white; border-radius: 15px; width: 100%;
            box-sizing: border-box; outline: none;
        }

        .angle-hero { font-size: 8rem; font-weight: 800; text-align: center; color: white; text-shadow: 0 0 40px var(--neon-blue); margin: 15px 0; }
        
        .timer-ui { 
            font-family: 'Syncopate'; font-size: 3rem; text-align: center; color: var(--alert-red); 
            display: none; animation: pulse 0.8s infinite;
        }

        @keyframes pulse { 50% { opacity: 0.4; } }

        .sim-dock {
            background: rgba(10, 0, 25, 0.95);
            padding: 40px; border-radius: 30px; border: 2px solid var(--neon-blue);
            display: flex; align-items: center; gap: 40px; margin-top: 40px;
        }

        input[type="range"] { flex: 1; accent-color: var(--neon-blue); height: 20px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; font-size: 1.3rem; }
        th { text-align: left; color: var(--neon-blue); padding: 20px; border-bottom: 2px solid var(--lightning-purple); }
        td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .badge { color: var(--alert-red); border: 1px solid var(--alert-red); padding: 5px 12px; border-radius: 8px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>SPINEGUARD <span style="font-weight:300; color:white;">ELITE</span></h1>
    <div id="liveClock" style="font-family:monospace; font-size:1.5rem; color:var(--lightning-purple);">00:00:00</div>
</header>

<div class="dashboard-grid">
    
    <div class="card">
        <h2>Person Wearing</h2>
        <input type="text" id="personWearing" placeholder="NAME OF SUBJECT..." onchange="saveInfo()">
        
        <div style="margin-top:60px;">
            <h2>Live Spline Angle</h2>
            <div class="angle-hero" id="angleDisplay">0°</div>
        </div>

        <div style="margin-top:60px;">
            <div class="timer-ui" id="breachTimer">0.0s</div>
            <div id="statusLabel" style="text-align:center; font-size:1.5rem; color:var(--neon-blue); font-weight:bold;">STATUS: OPTIMAL</div>
        </div>
    </div>

    <div class="card">
        <h2>Slouch Analytics: Angle vs. Duration</h2>
        <canvas id="analyticsChart" height="240"></canvas>
        <div style="display:flex; justify-content:space-between; margin-top:20px; font-weight:bold; color:var(--neon-blue);">
            <div>← DURATION (SECONDS)</div>
            <div>ANGLE MAGNITUDE (DEGREES) ↑</div>
        </div>
    </div>

    <div class="card full-width">
        <h2>Clinical Incident History</h2>
        <table>
            <thead>
                <tr>
                    <th>TIMESTAMP</th>
                    <th>NAME</th>
                    <th>PEAK ANGLE</th>
                    <th>THREAT LEVEL</th>
                    <th>TIME DURATION</th>
                </tr>
            </thead>
            <tbody id="incidentLog"></tbody>
        </table>
    </div>

    <div class="full-width sim-dock">
        <div style="font-family:'Syncopate'; font-size:0.9rem; color:var(--lightning-purple);">BEND_SIMULATOR</div>
        <input type="range" id="masterSlider" min="0" max="120" value="0" oninput="updateSystem(this.value)">
        <div id="simReadout" style="font-size:3rem; font-weight:bold; color:var(--neon-blue); width:120px; text-align:right;">0%</div>
    </div>

</div>

<script>
    let slouchStartTime = null;
    let alarmOn = false;
    let sessionPeakAngle = 0;

    // Initialize Scatter Chart
    const ctx = document.getElementById('analyticsChart').getContext('2d');
    const analyticsChart = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [{
                label: 'Slouch Events',
                data: [], 
                backgroundColor: 'rgba(255, 0, 85, 0.7)',
                borderColor: '#ff0055',
                borderWidth: 2,
                pointRadius: 12
            }]
        },
        options: {
            scales: {
                x: { title: { display: true, text: 'TIME DURATION (SECONDS)', color: '#00f2ff' }, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#fff' }, beginAtZero: true },
                y: { title: { display: true, text: 'ANGLE (°)', color: '#00f2ff' }, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#fff' }, beginAtZero: true, max: 120 }
            },
            plugins: { legend: { display: false } }
        }
    });

    function playAlert() {
        if (alarmOn) return;
        alarmOn = true;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'square'; osc.frequency.value = 880; gain.gain.value = 0.05;
        osc.start();
        setTimeout(() => { osc.stop(); alarmOn = false; }, 5000); 
    }

    function updateSystem(val) {
        const v = parseInt(val);
        document.getElementById('simReadout').innerText = v + "°";
        document.getElementById('angleDisplay').innerText = v + "°";
        
        const timerUI = document.getElementById('breachTimer');
        const status = document.getElementById('statusLabel');

        if (v > 45) {
            if (!slouchStartTime) {
                slouchStartTime = Date.now();
                sessionPeakAngle = v;
                timerUI.style.display = 'block';
                status.innerText = "STATUS: BREACH DETECTED";
                status.style.color = "var(--alert-red)";
                playAlert();
            }
            if (v > sessionPeakAngle) sessionPeakAngle = v;
            let elapsed = ((Date.now() - slouchStartTime) / 1000).toFixed(1);
            timerUI.innerText = elapsed + "s";
        } else {
            if (slouchStartTime) {
                const totalDuration = ((Date.now() - slouchStartTime) / 1000).toFixed(1);
                finalizeIncident(totalDuration, sessionPeakAngle);
                slouchStartTime = null;
                sessionPeakAngle = 0;
                timerUI.style.display = 'none';
                status.innerText = "STATUS: OPTIMAL";
                status.style.color = "var(--neon-blue)";
            }
        }
    }

    function finalizeIncident(duration, angle) {
        analyticsChart.data.datasets[0].data.push({ x: parseFloat(duration), y: angle });
        analyticsChart.update();

        const log = document.getElementById('incidentLog');
        const name = document.getElementById('personWearing').value || "USER_01";
        const row = log.insertRow(0);
        row.innerHTML = `
            <td>${new Date().toLocaleTimeString()}</td>
            <td>${name}</td>
            <td>${angle}°</td>
            <td><span class="badge">HIGH RISK</span></td>
            <td style="color:var(--neon-blue); font-weight:bold;">${duration} Seconds</td>
        `;
    }

    function saveInfo() {
        localStorage.setItem('wearerID', document.getElementById('personWearing').value);
    }

    setInterval(() => {
        document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    window.onload = () => {
        document.getElementById('personWearing').value = localStorage.getItem('wearerID') || "";
    };
</script>

</body>
</html>
