<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpineGuard Zenith | Bio-Mechanical Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --bg-dark: #05020a;
            --purple-glow: #7000ff;
            --neon-blue: #00d2ff;
            --critical-red: #ff0055;
            --glass: rgba(0, 210, 255, 0.07);
            --border-glow: rgba(112, 0, 255, 0.4);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* --- HEADER SECTION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 2px solid var(--border-glow);
            margin-bottom: 40px;
        }

        .title-unit h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(90deg, var(--neon-blue), var(--purple-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* --- LAYOUT GRID --- */
        .dashboard-grid {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 30px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(112, 0, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue);
        }

        .full-row { grid-column: 1 / -1; }

        /* --- BIG DATA ELEMENTS --- */
        h2 { 
            color: var(--neon-blue); font-family: 'Syncopate', sans-serif; 
            font-size: 1rem; letter-spacing: 3px; margin-bottom: 30px; 
        }

        #patientInput {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--neon-blue);
            padding: 20px;
            font-size: 1.5rem;
            color: white;
            border-radius: 15px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Space Grotesk';
        }

        .angle-display {
            font-size: 6rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 30px var(--neon-blue);
            margin: 20px 0;
            text-align: center;
        }

        /* --- THE SPINE MODEL --- */
        .spine-container {
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            margin: 20px 0;
        }

        .vertebra {
            width: 80px; height: 18px;
            background: var(--neon-blue);
            margin: 5px;
            border-radius: 6px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .alert-mode {
            background: var(--critical-red) !important;
            box-shadow: 0 0 30px var(--critical-red) !important;
        }

        /* --- SIMULATION TOOL BAR --- */
        .sim-dock {
            margin-top: 50px;
            padding: 50px;
            background: rgba(20, 10, 40, 0.8);
            border: 2px solid var(--purple-glow);
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 50px;
        }

        input[type="range"] {
            flex: 1;
            height: 20px;
            cursor: pointer;
            accent-color: var(--neon-blue);
        }

        .sim-label { font-family: 'Syncopate'; font-size: 1.2rem; color: var(--purple-glow); }

        /* --- LOGS TABLE --- */
        table { width: 100%; border-collapse: collapse; font-size: 1.2rem; }
        th { text-align: left; padding: 20px; color: var(--neon-blue); border-bottom: 1px solid var(--border-glow); }
        td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .status-tag {
            background: rgba(255, 0, 85, 0.2);
            color: var(--critical-red);
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            border: 1px solid var(--critical-red);
        }
    </style>
</head>
<body>

<header>
    <div class="title-unit">
        <h1>SPINEGUARD <span style="font-weight: 300;">V3-PRO</span></h1>
        <div style="font-size: 0.8rem; letter-spacing: 4px; color: var(--purple-glow);">NEURAL-POSTURE INTERFACE</div>
    </div>
    <div id="alarmStatus" style="font-size: 1.2rem; font-weight: bold; color: #555;">● STANDBY</div>
</header>

<div class="dashboard-grid">
    
    <div class="card">
        <h2>SUBJECT PROFILE</h2>
        <input type="text" id="patientInput" placeholder="SUBJECT NAME..." onchange="saveName()">
        
        <div class="spine-container" id="spineVisualizer">
            </div>

        <div class="angle-display" id="mainAngle">0°</div>
        <div id="statusText" style="text-align: center; font-size: 1.5rem; color: var(--neon-blue);">POSTURE OPTIMAL</div>
    </div>

    <div class="card">
        <h2>FLEX SENSOR TELEMETRY</h2>
        <canvas id="bigChart" height="200"></canvas>

        <div style="margin-top: 40px;">
            <h2>INCIDENT ARCHIVE</h2>
            <table>
                <thead><tr><th>TIMESTAMP</th><th>USER</th><th>BEND ANGLE</th><th>THREAT LEVEL</th></tr></thead>
                <tbody id="logHistory"></tbody>
            </table>
        </div>
    </div>

    <div class="full-row sim-dock">
        <div class="sim-label">SENSOR_EMULATION_FEED</div>
        <input type="range" id="masterSim" min="0" max="100" value="0" oninput="updateSystem(this.value)">
        <div style="font-size: 3rem; font-weight: bold; font-family: 'Syncopate'; width: 150px;" id="simPercent">0%</div>
    </div>
</div>

<script>
    // Create Spine Segments
    const spine = document.getElementById('spineVisualizer');
    const segments = [];
    for(let i=0; i<12; i++) {
        const seg = document.createElement('div');
        seg.className = 'vertebra';
        spine.appendChild(seg);
        segments.push(seg);
    }

    // High Resolution Chart
    const ctx = document.getElementById('bigChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(50).fill(''),
            datasets: [{
                data: Array(50).fill(0),
                borderColor: '#00d2ff',
                backgroundColor: 'rgba(0, 210, 255, 0.1)',
                borderWidth: 4,
                pointRadius: 0,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            scales: { 
                y: { beginAtZero: true, max: 100, grid: { color: 'rgba(112, 0, 255, 0.1)' }, ticks: { color: '#00d2ff', font: { size: 14 } } },
                x: { display: false }
            },
            plugins: { legend: { display: false } }
        }
    });

    let activeAlarm = false;

    function start5SecAlarm() {
        if (activeAlarm) return;
        activeAlarm = true;

        const alarmUI = document.getElementById('alarmStatus');
        alarmUI.innerText = "● CRITICAL ALARM ACTIVE";
        alarmUI.style.color = "var(--critical-red)";
        
        // Audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        osc.type = 'square';
        osc.frequency.value = 900;
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        
        osc.start();

        setTimeout(() => {
            osc.stop();
            activeAlarm = false;
            alarmUI.innerText = "● STANDBY";
            alarmUI.style.color = "#555";
        }, 5000);
    }

    function updateSystem(val) {
        document.getElementById('simPercent').innerText = val + "%";
        document.getElementById('mainAngle').innerText = val + "°";
        
        // Update Chart
        chart.data.datasets[0].data.push(val);
        chart.data.datasets[0].data.shift();
        chart.update('none');

        // Update Spine Visuals
        segments.forEach((s, i) => {
            const angle = (val / 10) * (i * 0.4);
            s.style.transform = `rotate(${angle}deg) translateX(${angle/2}px)`;
            
            if (val > 60) {
                s.classList.add('alert-mode');
                document.getElementById('statusText').innerText = "ALERT: SPINAL STRAIN";
                document.getElementById('statusText').style.color = "var(--critical-red)";
                start5SecAlarm();
                addLog(val);
            } else {
                s.classList.remove('alert-mode');
                document.getElementById('statusText').innerText = "POSTURE OPTIMAL";
                document.getElementById('statusText').style.color = "var(--neon-blue)";
            }
        });
    }

    function addLog(val) {
        const table = document.getElementById('logHistory');
        const name = document.getElementById('patientInput').value || "ANONYMOUS";
        const time = new Date().toLocaleTimeString();
        
        // Prevent duplicate spamming
        const lastRow = table.rows[0];
        if (lastRow && (new Date().getTime() - lastRow.dataset.time < 3000)) return;

        const row = table.insertRow(0);
        row.dataset.time = new Date().getTime();
        row.innerHTML = `<td>${time}</td><td>${name}</td><td>${val}°</td><td><span class="status-tag">CRITICAL BREACH</span></td>`;
        if (table.rows.length > 8) table.deleteRow(-1);
    }

    function saveName() {
        localStorage.setItem('spineSubject', document.getElementById('patientInput').value);
    }

    window.onload = () => {
        document.getElementById('patientInput').value = localStorage.getItem('spineSubject') || "";
    };
</script>

</body>
</html>
